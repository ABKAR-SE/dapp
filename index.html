<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Atlas Valley DApp</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
background:#0b0f1a;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.card{
background:#141b2d;
padding:20px;
border-radius:14px;
margin-top:20px;
}

button{
background:#00ffd0;
border:none;
padding:14px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

h1{
color:#00ffd0;
}
</style>

</head>

<body>

<h1>🌍 Atlas Valley</h1>

<div class="card">
<p id="user">Loading user...</p>
<p>XP: <span id="xp">0</span></p>

<button id="xpBtn">+10 XP</button>

</div>

<script type="module">

import { createClient }
from "https://esm.sh/@supabase/supabase-js@2";

// ======================
// INSERT YOUR KEYS
// ======================

const SUPABASE_URL = "https://bsgmplcnlqezuaxpjfsj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzZ21wbGNubHFlenVheHBqZnNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDExNDcsImV4cCI6MjA4NzkxNzE0N30.9-q2LgNL6ZmQjxopTViv3T7SGWU_W1unSiw0xjVyyEE";

// ======================
// INIT SUPABASE
// ======================

const supabase =
createClient(
SUPABASE_URL,
SUPABASE_KEY
);

// ======================
// TELEGRAM INIT
// ======================

const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

const telegramUser =
tg.initDataUnsafe?.user?.id
|| Math.floor(Math.random()*999999);

document.getElementById("user")
.innerText =
"Telegram ID: " + telegramUser;


// ======================
// USER INIT
// ======================

let currentUser;

async function initUser(){

let { data } =
await supabase
.from("users")
.select("*")
.eq("telegram_id", telegramUser)
.single();

if(!data){

const res =
await supabase
.from("users")
.insert({
telegram_id:String(telegramUser),
xp:0,
level:1
})
.select()
.single();

currentUser = res.data;

}else{
currentUser = data;
}

updateUI();
}

function updateUI(){
document.getElementById("xp")
.innerText = currentUser.xp;
}


// ======================
// XP BUTTON
// ======================

document
.getElementById("xpBtn")
.addEventListener("click", async ()=>{

let newXP = currentUser.xp + 10;

await supabase
.from("users")
.update({ xp:newXP })
.eq("telegram_id", telegramUser);

currentUser.xp = newXP;

updateUI();

tg.HapticFeedback
.impactOccurred("medium");

});

initUser();

</script>

</body>
</html>
